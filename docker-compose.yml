version: "3.8"

services:
  n8n:
    image: n8nio/n8n:0.236.2
    container_name: drygate-n8n-sandbox
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=drygate
      - N8N_BASIC_AUTH_PASSWORD=drygate-sandbox-pw
      - N8N_USER_MANAGEMENT_DISABLED=true
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_LOG_LEVEL=warn
      - HTTP_PROXY=http://mock-gateway:4000
      - HTTPS_PROXY=http://mock-gateway:4000
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - n8n_sandbox_data:/home/node/.n8n
    networks:
      - sandbox-net

  mock-gateway:
    build:
      context: ./mock-gateway
    container_name: drygate-mock-gateway
    restart: unless-stopped
    environment:
      - GATEWAY_PORT=4000
      - LOG_FILE=/tmp/egress-log.json
    networks:
      - sandbox-net

networks:
  sandbox-net:
    driver: bridge

volumes:
  n8n_sandbox_data:
